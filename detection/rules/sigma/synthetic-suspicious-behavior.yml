title: Synthetic Suspicious Behavior Detected
id: zds-sigma-001
status: experimental
description: Detects synthetic suspicious behavior generated by ZeroDaySentinel for defensive testing.
author: Lina Yildiz
date: 2026-05-06
logsource:
  product: synthetic
  service: zerodaysentinel
detection:
  selection:
    synthetic: true
    event_type:
      - auth_failure_burst
      - unexpected_child_process
      - unusual_outbound_pattern
      - sensitive_file_access_pattern
      - rare_admin_action
      - abnormal_api_frequency
  condition: selection
fields:
  - timestamp
  - source
  - host
  - user
  - event_type
  - severity
falsepositives:
  - Synthetic lab events
level: medium
