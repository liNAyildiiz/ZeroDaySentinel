name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -d docs
          test -d lab
          test -d detection
          test -d incident-response
          test -d disclosure
